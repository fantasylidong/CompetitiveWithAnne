// L4D2 PMA (近战武器属性) 诊断测试脚本
// 使用方法: 在游戏中执行 exec pma_diagnostic_test.cfg

echo "==================================="
echo "L4D2 PMA Diagnostic Test Script"
echo "==================================="

// 步骤1: 启用日志
sm_cvar l4d2_pma_log 1
echo "Step 1: Enabled logging"

// 步骤2: 检查插件状态
echo ""
echo "Step 2: Checking plugin status..."
sm plugins info l4d2_pma_native_attrs
echo "▲ Check if Status=Running and no errors"

// 步骤3: 检查Left4DHooks
echo ""
echo "Step 3: Checking Left4DHooks..."
sm plugins info left4dhooks
echo "▲ Check if Left4DHooks is loaded and version is recent"

// 步骤4: 清除现有配置
sm_pma_clear @me
echo "Step 4: Cleared existing profile"

// 步骤5: 列出当前配置（应该为空）
sm_pma_list
echo "▲ Should show no active profiles"

echo ""
echo "==================================="
echo "MANUAL TEST INSTRUCTIONS"
echo "==================================="
echo ""
echo "Test 1 - Baseline (Normal Speed):"
echo "  1. Pick up a baseball bat (or any melee)"
echo "  2. Swing it a few times"
echo "  3. Note the normal attack speed"
echo ""
echo "Test 2 - RefireDelay (Attack Speed):"
echo "  1. Run: sm_pma_set @me baseball_bat refiredelay 0.1"
echo "  2. Run: sm_pma_list (confirm settings)"
echo "  3. Swing the baseball bat rapidly"
echo "  4. If working: you should swing MUCH faster"
echo "  5. If NOT working: speed is unchanged"
echo ""
echo "Test 3 - Damage:"
echo "  1. Run: sm_pma_set @me baseball_bat damage 1000"
echo "  2. Hit a common infected"
echo "  3. Should one-shot kill (if working)"
echo ""
echo "Test 4 - Multiple Attributes:"
echo "  1. Run: sm_pma_set @me katana damage 500 refiredelay 0.05"
echo "  2. Pick up a katana"
echo "  3. Should deal 500 damage AND swing very fast"
echo ""
echo "Test 5 - Clear and Verify:"
echo "  1. Run: sm_pma_clear @me"
echo "  2. Swing should return to normal speed"
echo "  3. Damage should return to normal"
echo ""
echo "==================================="
echo "LOG ANALYSIS"
echo "==================================="
echo ""
echo "After testing, check logs/l4d2_pma_native_attrs.log"
echo ""
echo "✅ GOOD - These lines indicate it's working:"
echo "  - 'melee_natives_ready ok=1'"
echo "  - 'profile_set ... attr=refiredelay value=0.1'"
echo "  - 'tx_begin hook=StartMeleeSwing changed=1'"
echo "  - 'tx_end hook=StartMeleeSwing restored=1'"
echo ""
echo "❌ BAD - These lines indicate problems:"
echo "  - 'left4dhooks_unavailable ok=0'"
echo "  - 'melee_natives_not_ready ok=0'"
echo "  - 'tx_begin_empty' (attributes not applied)"
echo "  - No 'StartMeleeSwing' lines at all (forward not firing)"
echo ""
echo "==================================="
echo "COMMON ISSUES"
echo "==================================="
echo ""
echo "Issue 1: 'Left4DHooks melee natives are unavailable'"
echo "  Solution: Update Left4DHooks to latest version"
echo "  Required natives:"
echo "    - L4D2_GetFloatMeleeAttribute"
echo "    - L4D2_SetFloatMeleeAttribute"
echo "    - L4D_OnStartMeleeSwing forward"
echo ""
echo "Issue 2: RefireDelay doesn't change speed"
echo "  Possible causes:"
echo "    - Melee name mismatch (check sm_pma_list)"
echo "    - Forward not firing (check logs)"
echo "    - Attributes applied too late (timing issue)"
echo ""
echo "Issue 3: No effect at all"
echo "  Check:"
echo "    - Plugin enabled (sm_cvar l4d2_pma_enable)"
echo "    - License valid (sm_private_license_status)"
echo "    - Map fully loaded"
echo ""
echo "==================================="
echo "QUICK DEBUG COMMANDS"
echo "==================================="
echo ""
echo "// Check plugin status"
echo "sm plugins list | grep pma"
echo ""
echo "// Check Left4DHooks"
echo "sm plugins list | grep left4d"
echo ""
echo "// View current profiles"
echo "sm_pma_list"
echo ""
echo "// Set fast swing test"
echo "sm_pma_set @me baseball_bat refiredelay 0.05"
echo ""
echo "// Set high damage test"
echo "sm_pma_set @me baseball_bat damage 500"
echo ""
echo "// Clear all"
echo "sm_pma_clear @me"
echo ""
echo "// Check license"
echo "sm_private_license_status"
echo ""
echo "// View last 50 log lines"
echo "// (use server console or read file directly)"
echo ""
echo "==================================="
echo "EXPECTED BEHAVIOR"
echo "==================================="
echo ""
echo "refiredelay 0.1 (default is ~0.5-1.0):"
echo "  - Baseball bat should swing 2-5x faster"
echo "  - Should be able to spam mouse button"
echo ""
echo "damage 500 (default is ~250-350):"
echo "  - One-shot common infected"
echo "  - Two-shot most special infected"
echo ""
echo "weaponidletime 0.1 (default is ~2-3):"
echo "  - Weapon returns to idle pose much faster"
echo ""
echo "==================================="
echo "Test script loaded!"
echo "==================================="
echo ""
echo "Now:"
echo "1. Pick up a melee weapon (e.g., baseball bat)"
echo "2. Run: sm_pma_set @me baseball_bat refiredelay 0.1"
