// ============================================
// 特感控制插件 - 调试配置
// 用于测试波决策器和性能优化
// ============================================

// === 调试输出 ===
inf_DebugMode 2                      // 2=控制台+日志输出
inf_antibait_debug 1                 // Anti-Bait 调试输出

// === 性能统计 ===
inf_spawn_perf_stats 1               // 显示性能统计
inf_spawn_perf_mode 0                // 0=平衡模式（默认）

// === 性能优化开关（全部启用） ===
inf_spawn_perf_progressive 1         // 渐进式采样
inf_spawn_perf_adaptive_bucket 1     // 自适应桶窗口
inf_spawn_perf_early_dist_filter 1   // 早期距离过滤

// === 基础刷特设置 ===
l4d_infected_limit 6                 // 特感上限
versus_special_respawn_interval 16.0 // 刷新间隔16秒

// === AI难度联动 ===
inf_ai_difficulty_link 1             // 启用AI难度联动
inf_ai_difficulty_fallback_level 4   // 回退到专家难度

// === 波检查窗口（各难度） ===
// 格式：简单 普通 困难 专家 极限
inf_ai_wave_check_time "16.0 12.0 10.0 8.0 6.0"

// === Anti-Bait 设置 ===
inf_antibait_enable 1                // 启用 Anti-Bait
inf_antibait_grace 8.0               // Grace 期 8秒
inf_antibait_window 12.0             // 停滞判定窗口 12秒
inf_antibait_progress_pct 2          // 推进百分比阈值
inf_antibait_min_si_ratio 0.50       // 最小特感压力比例
inf_antibait_force_after 25.0        // 强制释放时间（已废弃，但保留）
inf_antibait_recover 4.0             // 恢复期 4秒
inf_antibait_action 2                // 2=启用所有动作

// === Anti-Bait 队形判定 ===
inf_antibait_cluster_dist 800.0      // 密集距离
inf_antibait_team_dist 1500.0        // 分散距离
inf_antibait_pair_dist 800.0         // 队友距离
inf_antibait_isolate_dist 1200.0     // 孤立距离

// === Nav 分桶设置 ===
inf_NavBucketEnable 1                // 启用分桶
inf_NavBucketWindow 10               // 桶窗口 ±10
inf_NavBucketLinkToRing 1            // 动态调整
inf_NavBucketFirstFit 0              // 关闭首次匹配
inf_NavBucketIncludeCenter 1         // 包含中心桶

// === 刷点评分 ===
inf_spawn_candidate_budget 8         // 候选预算
inf_spawn_score_floor 50.0           // 最低评分
inf_spawn_bucket_ratio 0.50          // 桶占比限制

echo "==================================="
echo "特感控制插件调试配置已加载"
echo "- 调试模式: 开启"
echo "- 性能统计: 开启"
echo "- AI难度: 专家(4)"
echo "- 刷新间隔: 16秒"
echo "- 检查窗口: 8秒"
echo "==================================="
