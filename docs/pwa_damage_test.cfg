// L4D2 PWA 伤害修复验证测试脚本
// 使用方法: 在游戏中执行 exec pwa_damage_test.cfg

echo "==================================="
echo "L4D2 PWA Damage Fix Test Script"
echo "==================================="

// 步骤1: 启用详细日志
sm_cvar l4d2_pwa_log_level 3
sm_cvar l4d2_pwa_damage_fallback_log 1
sm_cvar l4d2_pwa_firebullets_log 1
echo "Step 1: Enabled verbose logging"

// 步骤2: 确保fallback已启用
sm_cvar l4d2_pwa_damage_fallback 1
echo "Step 2: Enabled damage fallback"

// 步骤3: 清除现有配置
sm_pwa_clear @me
echo "Step 3: Cleared existing profile"

// 步骤4: 显示当前状态
sm_pwa_list
echo "Step 4: Listed profiles (should be empty)"

// 步骤5: 测试说明
echo ""
echo "==================================="
echo "MANUAL TEST INSTRUCTIONS"
echo "==================================="
echo ""
echo "Test 1 - Normal Damage (Baseline):"
echo "  1. Find an active weapon (e.g. AK47)"
echo "  2. Shoot a common infected"
echo "  3. Note the damage (should be ~58 for AK47)"
echo ""
echo "Test 2 - Modified Damage (2x):"
echo "  1. Run: sm_pwa_set @me @active damage 116"
echo "  2. Shoot a common infected"
echo "  3. Damage should now be ~116 (double)"
echo "  4. Check logs for 'damage_fallback' entries"
echo ""
echo "Test 3 - Modified Damage (high):"
echo "  1. Run: sm_pwa_set @me @active damage 500"
echo "  2. Shoot a common infected"
echo "  3. Should one-shot kill (250 HP)"
echo ""
echo "Test 4 - Special Infected:"
echo "  1. Keep damage at 500"
echo "  2. Shoot a Hunter (250 HP)"
echo "  3. Should one-shot kill"
echo ""
echo "Test 5 - Tank Multiplier:"
echo "  1. Run: sm_pwa_set @me @active tankdamagemult 5.0"
echo "  2. Shoot a Tank"
echo "  3. Should deal 500 * 5 = 2500 per hit"
echo ""
echo "Test 6 - Edge Cases:"
echo "  1. Try: sm_pwa_set @me @active damage 1"
echo "  2. Try: sm_pwa_set @me @active damage 9999"
echo "  3. Try: sm_pwa_set @me @active damage -1 (should reject)"
echo "  4. Try: sm_pwa_set @me @active damage 10000 (should reject)"
echo ""
echo "==================================="
echo "EXPECTED LOG PATTERNS"
echo "==================================="
echo ""
echo "In logs/l4d2_pwa_native_attrs.log, you should see:"
echo ""
echo "1. When setting profile:"
echo "   profile_set source=command client=... weapon=... attr=damage value=..."
echo ""
echo "2. When shooting:"
echo "   tx_begin ... hook=FireBullet ... changed=1"
echo "   tx_end ... hook=FireBullet"
echo "   damage_fallback ... old=58.0 new=116.0 ratio=2.0000"
echo ""
echo "3. If damage was NOT modified, you'd see:"
echo "   damage_fallback ... old=58.0 new=58.0 ratio=1.0000 (WRONG!)"
echo ""
echo "==================================="
echo "TROUBLESHOOTING"
echo "==================================="
echo ""
echo "If damage doesn't change:"
echo "  - Check 'sm_pwa_list' shows your profile"
echo "  - Verify l4d2_pwa_damage_fallback is 1"
echo "  - Check weapon matches (@active should auto-match)"
echo "  - Look for 'damage_fallback' in logs"
echo ""
echo "If you see errors:"
echo "  - Check l4d2_pwa_enable is 1"
echo "  - Verify left4dhooks is loaded"
echo "  - Check license is valid (sm_private_license_status)"
echo ""
echo "==================================="
echo "Quick Test Commands:"
echo "==================================="
echo ""
echo "// Set 2x damage"
echo "sm_pwa_set @me @active damage 116"
echo ""
echo "// Set 5x damage"
echo "sm_pwa_set @me @active damage 290"
echo ""
echo "// Set super damage + tank multiplier"
echo "sm_pwa_set @me @active damage 500"
echo "sm_pwa_set @me @active tankdamagemult 10.0"
echo ""
echo "// Clear all"
echo "sm_pwa_clear @me"
echo ""
echo "// View current settings"
echo "sm_pwa_list"
echo ""
echo "==================================="
echo "Test script loaded. Begin testing!"
echo "==================================="
