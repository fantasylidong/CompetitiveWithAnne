// =======================================================================================
// PureRealism - Vanilla-style L4D2 Configuration
// =======================================================================================

// ReadyUp Cvars
l4d_ready_cfg_name "PureRealism 1.0"

// Confogl Cvars
confogl_addcvar mp_gamemode "realism"

// Shared vanilla-style cvars
exec cfgogl/purecoop/shared_cvars.cfg

// Realism game mode defaults.
confogl_addcvar sv_disable_glow_survivors 1
confogl_addcvar sv_disable_glow_faritems 1
confogl_addcvar sv_rescue_disabled 1
confogl_addcvar z_non_head_damage_factor_multiplier 0.5
confogl_addcvar z_head_damage_causes_wounds 1
confogl_addcvar z_use_next_difficulty_damage_factor 1
confogl_addcvar z_witch_always_kills 1

// Apply cvars
exec cfgogl/purecoop/purecoop.cfg

// Remove globally loaded AnneCoop/gameplay plugins after sharedplugins.cfg runs.
exec cfgogl/purecoop/pure_plugins_off.cfg
