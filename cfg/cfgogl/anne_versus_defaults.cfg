// Anne configs force mp_gamemode "versus" for engine behavior. Keep the
// inherited GameModes/versus convars explicit so gamemodes.txt edits do not
// leak into Anne modes.
confogl_addcvar z_hunter_limit 2
confogl_addcvar z_smoker_limit 2
confogl_addcvar z_ghost_los_expected_progress 2000
confogl_addcvar director_special_initial_spawn_delay_min 2
confogl_addcvar director_special_initial_spawn_delay_max 10
