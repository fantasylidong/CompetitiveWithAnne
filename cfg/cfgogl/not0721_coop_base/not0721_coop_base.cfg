// Inherit AnneCoop behavior and only override the Not0721 gameplay layer.
exec cfgogl/coop/coop.cfg

// Four-survivor baseline. Anneduoren4 does not set the AnneHappy multislots cvars.
confogl_addcvar survivor_limit 4
confogl_addcvar l4d_multislots_survivors_manager_enable 0
confogl_addcvar l4d_multislots_max_survivors 4

// Existing project logic: RPG handles kill-heal, AnneHappy handles transition/respawn flow.
confogl_addcvar ReturnBlood 0

// Existing AnneHappy Tank handler replaces the source Tank HP behavior.
confogl_addcvar z_tank_health 6000
confogl_addcvar tank_damage_enable 1
confogl_addcvar tank_damage_enable_healthset 1

// Mirror the source ammo multiplier through the local dynamic ammo plugin.
confogl_addcvar l4d2_dynamic_ammo_enable 1
confogl_addcvar l4d2_dynamic_ammo_base_si 3
confogl_addcvar l4d2_dynamic_ammo_base_interval 35.0
confogl_addcvar l4d2_dynamic_ammo_alpha 0.0
confogl_addcvar l4d2_dynamic_ammo_beta 0.0
confogl_addcvar l4d2_dynamic_ammo_min_mult 6.0
confogl_addcvar l4d2_dynamic_ammo_max_mult 6.0
confogl_addcvar l4d2_dynamic_ammo_refill_mode 1
confogl_addcvar l4d2_dynamic_ammo_base_smg 650
confogl_addcvar l4d2_dynamic_ammo_base_rifle 360
confogl_addcvar l4d2_dynamic_ammo_base_pump 75
confogl_addcvar l4d2_dynamic_ammo_base_auto 90
confogl_addcvar l4d2_dynamic_ammo_base_sniper 150
confogl_addcvar l4d2_dynamic_ammo_base_gl 30
confogl_addcvar ammo_smg_max 3900
confogl_addcvar ammo_shotgun_max 450
confogl_addcvar ammo_autoshotgun_max 540
confogl_addcvar ammo_assaultrifle_max 2160
confogl_addcvar ammo_huntingrifle_max 900
confogl_addcvar ammo_sniperrifle_max 900
confogl_addcvar ammo_m60_max 900
confogl_addcvar ammo_grenadelauncher_max 180

confogl_addcvar ib_process_time 0.35
confogl_addcvar ib_vision_noticetimescale 1.4

exec sourcemod/dirspawn_presets/not0721_base.cfg
exec vote/weapon/Not0721_v1.cfg
