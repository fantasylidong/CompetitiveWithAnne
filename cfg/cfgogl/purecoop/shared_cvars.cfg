// =======================================================================================
// PureCoop - Vanilla-style L4D2 Configuration
// =======================================================================================

// Server Cvars
sv_pure 0
confogl_addcvar sv_alltalk 1
confogl_addcvar sv_cheats 0
confogl_addcvar sv_consistency 0
confogl_addcvar sv_pure_kick_clients 0
confogl_addcvar sv_voiceenable 1
confogl_addcvar sv_log_onefile 0
confogl_addcvar sv_logbans 1

// ReadyUp Cvars
l4d_ready_enabled 0
confogl_addcvar l4d_ready_survivor_freeze 0
confogl_addcvar l4d_ready_delay 3
confogl_addcvar l4d_ready_enable_sound 1
confogl_addcvar l4d_ready_chuckle 0
confogl_addcvar l4d_ready_live_sound "ui/survival_medal.wav"

// Config Cvars
confogl_match_execcfg_off           "confogl_off.cfg"
confogl_match_execcfg_on            "confogl.cfg"
confogl_match_killlobbyres          "0"
confogl_addcvar l4d2_lmm_unreserve_type 0
confogl_match_restart               "1"

// Keep Confogl's gameplay modules passive so coop stays close to stock behavior.
confogl_addcvar confogl_boss_tank                   "0"
confogl_addcvar confogl_lock_boss_spawns            "0"
confogl_addcvar confogl_remove_escape_tank          "0"
confogl_addcvar confogl_disable_tank_hordes         "0"
confogl_addcvar confogl_block_punch_rock            "0"
confogl_addcvar confogl_blockinfectedbots           "0"
confogl_addcvar director_allow_infected_bots        "1"
confogl_addcvar confogl_reduce_finalespawnrange     "0"
confogl_addcvar confogl_remove_chainsaw             "0"
confogl_addcvar confogl_remove_defib                "0"
confogl_addcvar confogl_remove_grenade              "0"
confogl_addcvar confogl_remove_m60                  "0"
confogl_addcvar confogl_remove_lasersight           "0"
confogl_addcvar confogl_remove_saferoomitems        "0"
confogl_addcvar confogl_remove_upg_explosive        "0"
confogl_addcvar confogl_remove_upg_incendiary       "0"
confogl_addcvar confogl_replace_cssweapons          "0"
confogl_addcvar confogl_replace_startkits           "0"
confogl_addcvar confogl_replace_finalekits          "0"
confogl_addcvar confogl_waterslowdown               "0"
confogl_addcvar confogl_enable_itemtracking         "0"
confogl_addcvar confogl_itemtracking_savespawns     "0"
confogl_addcvar confogl_itemtracking_mapspecific    "0"
confogl_addcvar confogl_adrenaline_limit            "-1"
confogl_addcvar confogl_pipebomb_limit              "-1"
confogl_addcvar confogl_molotov_limit               "-1"
confogl_addcvar confogl_vomitjar_limit              "-1"
confogl_addcvar confogl_SM_enable                   "0"
confogl_addcvar confogl_replace_tier2               "0"
confogl_addcvar confogl_replace_tier2_finale        "0"
confogl_addcvar confogl_replace_tier2_all           "0"
confogl_addcvar confogl_limit_tier2                 "0"
confogl_addcvar confogl_limit_tier2_saferoom        "0"
